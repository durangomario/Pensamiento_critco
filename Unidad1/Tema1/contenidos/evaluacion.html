<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Evaluación - Pensamiento Crítico</title>
  <style>
    body {
      font-family: Arial;
      margin: 20px;
    }

    .question {
      margin-bottom: 30px;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 10px;
    }

    .options {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .option {
      padding: 10px;
      border: 1px solid #333;
      border-radius: 5px;
      cursor: grab;
      background: #f2f2f2;
    }

    .dropzone {
      margin-top: 10px;
      padding: 15px;
      border: 2px dashed #aaa;
      border-radius: 5px;
      min-height: 40px;
    }

    .correct {
      color: green;
    }

    .incorrect {
      color: red;
    }

    #result {
      font-size: 20px;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h2>Evaluación: Pensamiento crítico y aprendizaje autónomo</h2>

  <div id="quiz"></div>

  <button onclick="calificar()">Calificar</button>
  <div id="result"></div>

  <script>
    const preguntas = [
      {
        texto: "Un estudiante debe elegir entre varios recursos en línea para aprender sobre APIs...",
        opciones: {
          A: "Seleccionar el recurso más fácil.",
          B: "Analizar fuentes y contrastar información.",
          C: "Elegir el más reciente."
        },
        correcta: "B",
        feedback: {
          A: "No siempre lo más fácil es lo más confiable.",
          B: "Correcto: implica análisis y validación de fuentes.",
          C: "La actualidad no garantiza calidad."
        }
      },
      {
        texto: "Un estudiante usa una solución sin comprenderla...",
        opciones: {
          A: "Aceptar la solución.",
          B: "Analizar y comprender el código.",
          C: "Reutilizar sin modificar."
        },
        correcta: "B",
        feedback: {
          A: "Cumplir no implica comprender.",
          B: "Correcto: entender permite mejorar.",
          C: "Reutilizar sin فهم limita el aprendizaje."
        }
      },
      {
        texto: "Recibe retroalimentación sobre eficiencia...",
        opciones: {
          A: "Mantener solución.",
          B: "Evaluar mejoras.",
          C: "Ignorar feedback."
        },
        correcta: "B",
        feedback: {
          A: "Cumplir mínimos no es óptimo.",
          B: "Correcto: mejora continua.",
          C: "Ignorar limita el aprendizaje."
        }
      },
      {
        texto: "Debate sobre framework...",
        opciones: {
          A: "Elegir popular.",
          B: "Evaluar argumentos.",
          C: "Mantener postura."
        },
        correcta: "B",
        feedback: {
          A: "Popularidad ≠ mejor opción.",
          B: "Correcto: decisión basada en evidencia.",
          C: "Ignorar otras ideas limita el análisis."
        }
      },
      {
        texto: "Resolver problema con múltiples soluciones...",
        opciones: {
          A: "Elegir la más rápida.",
          B: "Usar la conocida.",
          C: "Comparar alternativas."
        },
        correcta: "C",
        feedback: {
          A: "Rapidez no siempre es calidad.",
          B: "Limita el pensamiento crítico.",
          C: "Correcto: análisis integral."
        }
      }
    ];

    const quiz = document.getElementById("quiz");

    preguntas.forEach((p, i) => {
      const div = document.createElement("div");
      div.className = "question";

      div.innerHTML = `<p><b>Pregunta ${i + 1}:</b> ${p.texto}</p>`;

      const optionsDiv = document.createElement("div");
      optionsDiv.className = "options";

      for (let key in p.opciones) {
        const opt = document.createElement("div");
        opt.className = "option";
        opt.draggable = true;
        opt.id = `q${i}_${key}`;
        opt.innerText = key + ": " + p.opciones[key];

        opt.addEventListener("dragstart", e => {
          e.dataTransfer.setData("text", e.target.id);
        });

        optionsDiv.appendChild(opt);
      }

      const drop = document.createElement("div");
      drop.className = "dropzone";
      drop.id = `drop${i}`;
      drop.innerText = "Arrastra tu respuesta aquí";

      drop.addEventListener("dragover", e => e.preventDefault());

      drop.addEventListener("drop", e => {
        e.preventDefault();
        const data = e.dataTransfer.getData("text");
        const dragged = document.getElementById(data);
        drop.innerHTML = "";
        drop.appendChild(dragged);
      });

      const feedback = document.createElement("div");
      feedback.id = `feedback${i}`;

      div.appendChild(optionsDiv);
      div.appendChild(drop);
      div.appendChild(feedback);

      quiz.appendChild(div);
    });

    function calificar() {
      let correctas = 0;

      preguntas.forEach((p, i) => {
        const drop = document.getElementById(`drop${i}`);
        const feedback = document.getElementById(`feedback${i}`);

        if (drop.children.length > 0) {
          const respuesta = drop.children[0].id.split("_")[1];

          if (respuesta === p.correcta) {
            correctas++;
            feedback.innerHTML = `<p class="correct">✔ ${p.feedback[respuesta]}</p>`;
          } else {
            feedback.innerHTML = `<p class="incorrect">✘ ${p.feedback[respuesta]}</p>`;
          }
        } else {
          feedback.innerHTML = `<p class="incorrect">✘ No respondida</p>`;
        }
      });

      let porcentaje = (correctas / preguntas.length) * 100;
      document.getElementById("result").innerText =
        `Resultado final: ${porcentaje.toFixed(0)}% (${correctas}/${preguntas.length})`;
    }
  </script>

</body>

</html>
